name: Engineer OOF Notification Check

on:
  schedule:
    # Run daily at 12:00 PM UTC (7:00 AM PST / 10:00 AM EST)
    - cron: '0 12 * * *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  check-oof-status:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openpyxl
      
      - name: Run OOF Notification Agent
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          SHAREPOINT_SITE: ${{ secrets.SHAREPOINT_SITE }}
          ROSTER_FILE: ${{ secrets.ROSTER_FILE }}
        run: |
          python oof_notifier.py
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: oof-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
